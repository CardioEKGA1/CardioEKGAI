<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ab0f0"/>
      <stop offset="100%" stop-color="#9b8fe8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#bg)"/>
  <g transform="translate(16,16)" stroke="white" stroke-linecap="round" fill="none">
    <!-- Wing tips -->
    <path d="M 16 6 L 10 9" stroke-width="1.8"/>
    <path d="M 16 6 L 22 9" stroke-width="1.8"/>
    <path d="M 13 8 L 10 9" stroke-width="1.4" stroke-opacity="0.75"/>
    <path d="M 19 8 L 22 9" stroke-width="1.4" stroke-opacity="0.75"/>
    <!-- Soft central staff -->
    <line x1="16" y1="7" x2="16" y2="27" stroke-width="1.6" stroke-opacity="0.45"/>
    <!-- Double helix — two intertwining curves -->
    <path d="M 16 10 Q 8 13 16 16 Q 24 19 16 22 Q 10 24 13 27" stroke-width="2"/>
    <path d="M 16 10 Q 24 13 16 16 Q 8 19 16 22 Q 22 24 19 27" stroke-width="2"/>
    <!-- Crossing node dots -->
    <circle cx="16" cy="16" r="1.2" fill="white" stroke="none"/>
    <circle cx="16" cy="22" r="1" fill="white" fill-opacity="0.85" stroke="none"/>
  </g>
</svg>
