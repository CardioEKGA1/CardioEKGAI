    <!-- Per-domain title fallback: sets the tab title before React boots,
         based on the host. Crawlers see the static <title> above. -->
    <script>
      (function() {
        try {
          var h = window.location.host.toLowerCase();
          if (h.indexOf('ekgscan') !== -1) {
            document.title = 'EKGScan — 12-lead EKG interpretation in seconds';
          }
        } catch (e) {}
      })();
