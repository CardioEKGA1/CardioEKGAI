<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7ab0f0" />

    <title>SoulMD</title>
    <meta name="description" content="10 AI-powered clinical tools built by a physician. EKG interpretation, nephrology, radiology, antibiotic guidance, and more." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://soulmd.us/" />

    <!-- Icons — SVG for modern browsers (scales perfectly), ICO fallback for old ones -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link id="pwa-manifest" rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- iOS PWA: makes "Add to Home Screen" launch full-screen (no Safari chrome). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta id="apple-mobile-web-app-title" name="apple-mobile-web-app-title" content="SoulMD" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SoulMD" />
    <meta property="og:title" content="SoulMD — AI Clinical Suite" />
    <meta property="og:description" content="10 AI-powered clinical tools built by a physician. EKG interpretation, nephrology, radiology, antibiotic guidance, and more." />
    <meta property="og:url" content="https://soulmd.us/" />
    <meta property="og:image" content="https://soulmd.us/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SoulMD Clinical AI Suite" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SoulMD — AI Clinical Suite" />
    <meta name="twitter:description" content="10 AI-powered clinical tools built by a physician. EKG interpretation, nephrology, radiology, antibiotic guidance, and more." />
    <meta name="twitter:image" content="https://soulmd.us/og-image.png" />

    <!-- Per-domain title fallback: sets the tab title before React boots,
         based on the host. Crawlers see the static <title> above.
         Also swaps the PWA manifest when on /concierge so "Add to Home
         Screen" installs a dedicated SoulMD Concierge app with its own
         identity, theme color, and scope. -->
    <script>
      (function() {
        try {
          var h = window.location.host.toLowerCase();
          if (h.indexOf('ekgscan') !== -1) {
            document.title = 'EKGScan — 12-lead EKG interpretation in seconds';
          }
          if (window.location.pathname.indexOf('/concierge') === 0) {
            var m = document.getElementById('pwa-manifest');
            if (m) m.setAttribute('href', '/manifest-concierge.json');
            var tc = document.querySelector('meta[name="theme-color"]');
            if (tc) tc.setAttribute('content', '#2ABFBF');
            var t = document.getElementById('apple-mobile-web-app-title');
            if (t) t.setAttribute('content', 'Concierge');
            document.title = 'SoulMD Concierge';
          }
        } catch (e) {}
      })();

      // Register the service worker. Scoped to /, which covers /concierge too.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
      }
    </script>
  </head>
  <body>
    <noscript>SoulMD requires JavaScript. Please enable it and reload this page.</noscript>
    <div id="root"></div>
  </body>
</html>
